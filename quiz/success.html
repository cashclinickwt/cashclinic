<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تم الطلب | كاش كلينك</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--purple:#2F1749;--gold:#D3A146;--teal:#2F8789;--cream:#FFE6BB;--ink:#1B1226;
    --g500:#756E80;--g200:#E4E1EA;--g050:#FAF9FB;--burgundy:#962E37}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;min-height:100vh;display:grid;place-items:center;
    background:var(--g050);color:var(--ink);padding:20px;line-height:1.7}
  .card{background:#fff;max-width:440px;width:100%;border-radius:24px;padding:38px 30px;text-align:center;
    box-shadow:0 18px 48px rgba(47,23,72,.12);border:1px solid var(--g200)}
  .lock{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:20px}
  .lock img{height:36px}.lock .wm{font-size:21px;font-weight:300;color:var(--purple)}.lock .wm b{font-weight:600}
  .ic{width:78px;height:78px;border-radius:50%;display:grid;place-items:center;margin:0 auto 22px;font-size:38px;color:#fff}
  .ic.ok{background:var(--teal)} .ic.wait{background:var(--gold);color:var(--purple)} .ic.fail{background:var(--burgundy)}
  h1{font-size:23px;font-weight:600;color:var(--purple);margin-bottom:10px}
  p{color:var(--g500);font-size:15px;margin-bottom:8px}
  .mail{font-weight:600;color:var(--purple)}
  .spin{width:42px;height:42px;border:4px solid var(--g200);border-top-color:var(--teal);border-radius:50%;margin:0 auto 22px;animation:r 1s linear infinite}
  @keyframes r{to{transform:rotate(360deg)}}
  .wa{margin-top:16px;font-size:13px}.wa a{color:var(--teal);font-weight:600;text-decoration:none}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="lock"><img src="cc-mark.png" alt="Cash Clinic"><span class="wm">cash <b>clinic</b></span></div>
  <div class="spin"></div>
  <h1>نتأكد من دفعتك…</h1>
  <p>لحظات ونأكد لك الطلب.</p>
</div>
<script type="module">
const CONFIG={firebase:{apiKey:"AIzaSyCfD6ocmBsGVJms69TDbKt1PkcdSsGc3so",authDomain:"cash-quiz-906a6.firebaseapp.com",
  projectId:"cash-quiz-906a6",storageBucket:"cash-quiz-906a6.firebasestorage.app",
  messagingSenderId:"547780714224",appId:"1:547780714224:web:0e97107045a803623dec35"},
  functionsRegion:"us-central1",whatsapp:"96522260820"};
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-functions.js";
const app=initializeApp(CONFIG.firebase);
const getOrderStatus=httpsCallable(getFunctions(app,CONFIG.functionsRegion),"getOrderStatus");
const card=document.getElementById("card");
const orderId=new URLSearchParams(location.search).get("order");
let productName="الكتاب";
const L='<div class="lock"><img src="cc-mark.png" alt="Cash Clinic"><span class="wm">cash <b>clinic</b></span></div>';
function ok(){card.innerHTML=L+`<div class="ic ok">✓</div><h1>تم الدفع بنجاح 🎉</h1>
  <p>أرسلنا لك <span class="mail">${productName}</span> على إيميلك مباشرة.</p>
  <p>لو ما وصلتك الرسالة خلال دقائق، تأكد من صندوق <b>Spam / المهملات</b>.</p>
  <div class="wa">أي مساعدة؟ <a href="https://wa.me/${CONFIG.whatsapp}" target="_blank" rel="noopener">راسلنا واتساب</a></div>`;}
function pending(){card.innerHTML=L+`<div class="ic wait">⏳</div><h1>استلمنا طلبك</h1>
  <p>نأكد الدفعة الحين، وبيوصلك الكتاب على إيميلك خلال دقائق.</p>
  <div class="wa">ما وصلك شي بعد 10 دقائق؟ <a href="https://wa.me/${CONFIG.whatsapp}" target="_blank" rel="noopener">راسلنا واتساب</a></div>`;}
function fail(){card.innerHTML=L+`<div class="ic fail">!</div><h1>ما تمت الدفعة</h1>
  <p>يبدو إن العملية ما اكتملت. تقدر ترجع وتحاول مرة ثانية.</p>
  <div class="wa">محتاج مساعدة؟ <a href="https://wa.me/${CONFIG.whatsapp}" target="_blank" rel="noopener">راسلنا واتساب</a></div>`;}
async function poll(t=0){
  if(!orderId){pending();return;}
  try{const r=await getOrderStatus({orderId});const s=r.data.status;
    if(r.data.product) productName=r.data.product;
    if(s==="paid"){ok();return;} if(["failed","declined","cancelled"].includes(s)){fail();return;}
  }catch(e){console.warn(e);}
  if(t<8){setTimeout(()=>poll(t+1),2500);}else{pending();}
}
poll();
</script>
</body>
</html>
