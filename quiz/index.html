<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تشخيص الوفرة المالية | كاش كلينك</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#2F1748; --blue-d:#1B1226; --blue-soft:#F3F0F8;
    --gold:#D5A347; --gold-d:#AD8132; --yellow:#2A898C;
    --purple:#962D38;
    --ink:#1B1226; --muted:#756E80; --line:#E4E1EA; --bg:#ffffff;
    --soft:#FAF9FB; --red:#962D38; --green:#2A898C; --amber:#D5A347;
    --radius:18px; --shadow:0 14px 44px rgba(20,30,60,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;color:var(--ink);
    background:var(--bg);line-height:1.7;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:840px;margin:0 auto;padding:40px 18px 90px;position:relative}
  /* ---------- logo header ---------- */
  .topbar{display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 0 6px}
  .topbar img{height:52px;width:auto;max-width:88%;display:block;animation:logoin .6s cubic-bezier(.2,1.3,.4,1)}
  .topbar .tag{color:var(--muted);font-size:13px;font-weight:500;letter-spacing:.2px}
  .topbar .brandlock{display:flex;align-items:center;gap:10px;animation:logoin .6s cubic-bezier(.2,1.3,.4,1)}
  .topbar .brandlock img{height:44px;width:auto;animation:none}
  .topbar .wm{font-size:23px;font-weight:300;color:var(--ink);letter-spacing:-.01em}
  .topbar .wm b{font-weight:600}
  @keyframes logoin{from{opacity:0;transform:translateY(-8px) scale(.96)}to{opacity:1;transform:none}}
  @keyframes qin{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  @keyframes cardin{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .progress{height:7px;background:var(--line);border-radius:99px;overflow:hidden;margin:18px 4px 32px}
  .progress > i{display:block;height:100%;width:0;border-radius:99px;
    background:linear-gradient(90deg,var(--blue),#3d92dd);transition:width .35s ease}
  /* ---------- decorative brand dots ---------- */
  .dots{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
  .dots span{position:absolute;border-radius:50%;opacity:.10}
  /* ---------- card / question ---------- */
  .card{background:var(--bg);position:relative;z-index:1}
  .opt:hover{border-color:#bcd6f0;background:var(--blue-soft);transform:translateY(-1px)}
  .opt:active{transform:scale(.99)}
  .eyebrow{color:var(--blue);font-weight:700;font-size:14px;margin-bottom:10px;
    display:inline-flex;align-items:center;gap:7px}
  .eyebrow::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--gold)}
  h1.q{font-size:clamp(22px,4.4vw,30px);font-weight:800;line-height:1.45;margin:0 0 26px;color:var(--ink)}
  .options{display:flex;flex-direction:column;gap:12px;max-width:580px;margin-inline-start:auto}
  .opt{
    display:flex;align-items:center;gap:14px;cursor:pointer;
    border:1.5px solid var(--line);border-radius:14px;padding:15px 16px;
    transition:border-color .18s, background .18s, box-shadow .18s, transform .12s;background:#fff;
  }
  .opt:hover{border-color:#bcd6f0;background:var(--blue-soft)}
  .opt .ring{flex:0 0 auto;width:22px;height:22px;border-radius:50%;border:2.5px solid #c4cad6;
    display:grid;place-items:center;transition:.15s}
  .opt .ring i{width:11px;height:11px;border-radius:50%;background:var(--blue);transform:scale(0);transition:.15s}
  .opt.sel{border-color:var(--blue);background:var(--blue-soft);box-shadow:0 4px 14px rgba(37,120,196,.12)}
  .opt.sel .ring{border-color:var(--blue)}
  .opt.sel .ring i{transform:scale(1)}
  .opt span.t{font-size:16px;font-weight:500;color:var(--ink)}
  .opt .go{margin-inline-start:auto;color:#cbd0db;font-size:24px;font-weight:800;line-height:1;
    opacity:0;transform:translateX(-6px);transition:.16s}
  .opt:hover .go{opacity:1;transform:none;color:var(--blue)}
  .opt.sel .go{opacity:1;transform:none;color:var(--blue)}
  .opt:active{transform:scale(.992)}
  .opt.sel .ring i{animation:pop .32s ease}
  @keyframes pop{0%{transform:scale(0)}55%{transform:scale(1.3)}100%{transform:scale(1)}}
  .nav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:32px}
  .btn{appearance:none;border:0;cursor:pointer;font-family:inherit;font-weight:700;font-size:17px;
    border-radius:12px;padding:15px 44px;transition:.18s;color:#fff;background:var(--blue)}
  .btn:hover{background:var(--blue-d)}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.ghost{background:transparent;color:var(--muted);padding:12px 14px;font-size:15px}
  .btn.ghost:hover{color:var(--ink)}
  .btn.gold{background:var(--gold);color:#1b1814}
  .btn.gold:hover{background:var(--gold-d)}
  /* ---------- question transitions ---------- */
  .qcard{animation:qIn .36s cubic-bezier(.2,.7,.3,1) both}
  .qcard.back{animation:qInBack .36s cubic-bezier(.2,.7,.3,1) both}
  .qcard.out{opacity:0;transform:translateX(-34px);transition:opacity .2s ease, transform .2s ease}
  .qcard.out-back{opacity:0;transform:translateX(34px);transition:opacity .2s ease, transform .2s ease}
  @keyframes qIn{from{opacity:0;transform:translateX(36px)}to{opacity:1;transform:none}}
  @keyframes qInBack{from{opacity:0;transform:translateX(-36px)}to{opacity:1;transform:none}}
  /* ---------- result ---------- */
  .result{display:none;position:relative;z-index:1}
  .result.show{display:block;animation:fade .5s ease}
  @keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  .result.show > *{animation:rise .5s ease both}
  .result.show > *:nth-child(2){animation-delay:.05s}
  .result.show > *:nth-child(3){animation-delay:.12s}
  .result.show > *:nth-child(4){animation-delay:.18s}
  .result.show > *:nth-child(5){animation-delay:.24s}
  .result.show > *:nth-child(6){animation-delay:.30s}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .hero{display:grid;grid-template-columns:300px 1fr;gap:30px;align-items:center;margin-bottom:48px;
    position:relative;background:#fff;border:1px solid var(--line);border-radius:24px;
    padding:30px;box-shadow:var(--shadow);overflow:hidden}
  .gaugebox{text-align:center;position:relative;z-index:1}
  .hero > div:not(.dots):not(.gaugebox){position:relative;z-index:1}
  .gaugebox .label{color:var(--muted);font-weight:700;margin-top:2px}
  .gaugebox .pct{font-size:48px;font-weight:800;line-height:1.1}
  .legend{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:12px;font-size:13px;color:var(--muted);font-weight:500}
  .legend b{display:inline-flex;align-items:center;gap:6px;font-weight:500}
  .legend .sw{width:11px;height:11px;border-radius:50%}
  .hero h2{font-size:clamp(20px,3.4vw,25px);font-weight:800;line-height:1.55;margin:0 0 14px;color:var(--ink)}
  .hero p{color:#5f6573;font-size:15px;margin:0;line-height:1.85}
  .sectitle{text-align:center;font-size:24px;font-weight:800;margin:10px 0 26px;color:var(--ink)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:48px}
  .grid .metric{animation:cardin .55s ease both}
  .grid .metric:nth-child(2){animation-delay:.08s}
  .grid .metric:nth-child(3){animation-delay:.16s}
  .grid .metric:nth-child(4){animation-delay:.24s}
  .analysis .anbox{animation:cardin .55s ease both}
  .analysis .anbox:nth-child(2){animation-delay:.1s}
  .metric{background:#fff;border:1px solid var(--line);border-radius:20px;padding:24px;
    position:relative;overflow:hidden}
  .metric::before{content:'';position:absolute;top:0;right:0;left:0;height:5px;background:var(--cc,var(--blue))}
  .metric .mhead{display:flex;align-items:center;gap:11px;margin-bottom:12px}
  .metric .chip{width:38px;height:38px;border-radius:11px;flex:0 0 auto;display:grid;place-items:center;
    background:var(--cc,var(--blue));color:#fff;font-size:19px;font-weight:800}
  .metric h3{margin:0;font-size:18px;font-weight:800;color:var(--ink)}
  .metric p{margin:0 0 18px;color:#6b7080;font-size:14px;line-height:1.85}
  .bar{height:9px;background:#eef0f3;border-radius:99px;overflow:hidden}
  .bar > i{display:block;height:100%;border-radius:99px;width:0;transition:width 1s ease}
  .metric .val{display:flex;justify-content:flex-start;gap:6px;margin-top:11px;font-weight:800;font-size:15px}
  .metric .val .tag{font-weight:500;color:var(--muted)}
  .analysis{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:50px}
  .anbox{background:#fff;border:1px solid var(--line);border-radius:20px;padding:26px}
  .anbox .head{display:flex;align-items:center;gap:11px;justify-content:flex-start;margin-bottom:18px;font-weight:800;font-size:18px;color:var(--ink)}
  .anbox .ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;color:#fff;font-size:19px}
  .anbox.good .ic{background:var(--green)} .anbox.work .ic{background:var(--gold)}
  .anbox ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:15px}
  .anbox li{display:flex;gap:11px;font-size:14.5px;color:#444a59;line-height:1.8}
  .anbox li::before{flex:0 0 auto;width:20px;height:20px;margin-top:2px;border-radius:6px;
    display:grid;place-items:center;font-weight:800;font-size:12px}
  .anbox.good li::before{content:'✓';background:#eaf6ec;color:var(--green)}
  .anbox.work li::before{content:'!';background:#fdf2e0;color:var(--gold-d)}
  /* ---------- CTA ---------- */
  .cta{position:relative;background:linear-gradient(135deg,#1e1b16,#2a2420);color:#fff;
    border-radius:24px;padding:50px 28px;text-align:center;overflow:hidden}
  .cta h2{font-size:clamp(22px,4vw,30px);font-weight:800;margin:0 0 16px;position:relative;z-index:1}
  .cta p{color:#cfccc7;max-width:640px;margin:0 auto 28px;font-size:15px;position:relative;z-index:1;line-height:1.85}
  .cta .btn{position:relative;z-index:1;padding:16px 42px;font-size:18px;box-shadow:0 8px 24px rgba(243,175,47,.3)}
  .cta .price{display:block;margin-top:16px;color:#bdb9b4;font-size:14px;position:relative;z-index:1}
  /* ---------- modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(12,12,18,.55);display:none;place-items:center;z-index:50;padding:18px}
  .overlay.show{display:grid;animation:fade .25s ease}
  .modal{background:#fff;border-radius:20px;max-width:430px;width:100%;padding:30px 26px;box-shadow:var(--shadow)}
  .modal h3{margin:0 0 6px;font-size:22px;font-weight:800}
  .modal .sub{color:var(--muted);font-size:14px;margin:0 0 22px}
  .field{margin-bottom:14px}
  .field label{display:block;font-weight:700;font-size:13px;margin-bottom:6px}
  .field input{width:100%;font-family:inherit;font-size:16px;padding:13px 14px;border:1.5px solid var(--line);
    border-radius:11px;background:#fff;transition:.15s}
  .field input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft)}
  .modal .btn{width:100%;margin-top:8px}
  .modal .close{float:left;background:none;border:0;font-size:22px;color:var(--muted);cursor:pointer;line-height:1}
  .err{color:var(--red);font-size:13px;font-weight:600;min-height:18px;margin:4px 2px 0}
  .secure{display:flex;align-items:center;justify-content:center;gap:7px;color:var(--muted);font-size:12px;margin-top:14px}
  /* responsive */
  @media (max-width:680px){
    .hero{grid-template-columns:1fr;text-align:center}
    .gaugebox{max-width:300px;margin:0 auto}
    .grid,.analysis{grid-template-columns:1fr}
    .options{margin-inline-start:0}
    .nav{justify-content:space-between}
    .btn{padding:14px 30px}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  /* ---------- confetti ---------- */
  .confetti{position:fixed;top:-14px;z-index:60;pointer-events:none;border-radius:2px;
    will-change:transform,opacity;animation:cfall linear forwards}
  @keyframes cfall{0%{opacity:1}to{transform:translateY(108vh) rotate(560deg);opacity:.15}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brandlock"><img src="cc-mark.png" alt="Cash Clinic"/><span class="wm">cash <b>clinic</b></span></div>
    <div class="tag">تشخيص الوفرة المالية</div>
  </div>
  <div class="progress" id="progress" aria-hidden="true"><i id="pbar"></i></div>

  <!-- QUESTION STAGE -->
  <div class="card" id="stage" role="form" aria-label="تشخيص الوفرة المالية"></div>

  <!-- RESULT STAGE -->
  <div class="result" id="result"></div>
</div>

<!-- BUYER MODAL -->
<div class="overlay" id="overlay">
  <div class="modal" role="dialog" aria-modal="true" aria-label="إتمام الطلب">
    <button class="close" id="mClose" aria-label="إغلاق">×</button>
    <h3>احصل على دليل الوفرة المالية</h3>
    <p class="sub">عبّي بياناتك وبتوصلك نسخة الكتاب على إيميلك مباشرة بعد الدفع.</p>
    <div class="field"><label for="bName">الاسم</label><input id="bName" autocomplete="name" placeholder="اسمك الكامل" /></div>
    <div class="field"><label for="bEmail">الإيميل</label><input id="bEmail" type="email" inputmode="email" autocomplete="email" placeholder="example@email.com" /></div>
    <div class="field"><label for="bPhone">رقم الواتساب (اختياري)</label><input id="bPhone" type="tel" inputmode="tel" autocomplete="tel" placeholder="9xxxxxxx" /></div>
    <div class="err" id="mErr"></div>
    <button class="btn" id="mPay">الانتقال للدفع</button>
    <div class="secure">🔒 الدفع آمن عبر Tap — ما نحفظ بيانات بطاقتك</div>
  </div>
</div>

<script type="module">
/* ============================================================
   1) CONFIG  — عبّي هالقيم (راجعي ملف SETUP.md)
   ============================================================ */
const CONFIG = {
  firebase: {
    apiKey: "REPLACE_API_KEY",
    authDomain: "cash-site-bdd7e.firebaseapp.com",
    projectId: "cash-site-bdd7e",
    storageBucket: "cash-site-bdd7e.appspot.com",
    messagingSenderId: "REPLACE_SENDER_ID",
    appId: "REPLACE_APP_ID"
  },
  functionsRegion: "us-central1",
  bookPriceLabel: "٢٠ د.ك"     // العرض فقط — السعر الحقيقي محسوب بالسيرفر
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-functions.js";

const app = initializeApp(CONFIG.firebase);
const db  = getFirestore(app);
const fns = getFunctions(app, CONFIG.functionsRegion);
const createTapCharge = httpsCallable(fns, "createTapCharge");

/* ============================================================
   2) QUESTIONS  (cat = الفئة, score 0..3)
   categories: mindset=العقلية | discipline=الانضباط | resilience=المرونة | growth=الاستعداد
   ============================================================ */
const Q = [
  { id:"q1", scored:false, seg:true,
    text:"قبل ما نبدأ، قول لنا .. أنت تتعامل مع الفلوس بأي صفة؟",
    options:[
      { t:"مسؤول عن ميزانية بيتي و عائلتي", seg:"family" },
      { t:"مسؤول عن مالي الشخصي بس", seg:"personal" },
      { t:"الاثنين مع بعض (شخصية + عائلية)", seg:"family" }
    ]},

  { id:"q2", cat:"mindset",
    text:"لو وصلتك مكافأة فجأة (٥٠٠ دك)، شنو أول رد فعل عندك؟",
    fb:{high:"عندك وعي ممتاز بتقسيم المكافآت والتخطيط لها قبل لا توصل.",
        low:"ركز على وضع خطة للمبالغ المفاجئة قبل لا تصرفها، عشان تشتغل لصالحك."},
    options:[
      { t:"أصرفها على شي أحتاجه أو نحتاجه من زمان", s:0 },
      { t:"أحطها بالحساب بدون خطة محددة", s:1 },
      { t:"أوزعها بين مصاريف وادخار", s:2 },
      { t:"عندي بالضبط خطة لها قبل لا توصل", s:3 }
    ]},

  { id:"q3", cat:"discipline",
    text:'لو سألك أحد المقربين "شلون أنظم فلوسي؟"، شنو راح تقول له؟',
    fb:{high:"تعرف أهمية الميزانية الشهرية، وهذا يغطي لك جانب كبير من التحكم المالي.",
        low:"ابدأ بنظام بسيط لتنظيم فلوسك حتى يكون عندك جواب واضح ومجرب."},
    options:[
      { t:"صراحة ما عندي جواب واضح أعطيه", s:0 },
      { t:"لا تصرف على اللي ما تحتاجه", s:1 },
      { t:"سو ميزانية شهرية أو جدول مصاريف", s:2 },
      { t:"عندي نظام محدد ومجرب أعلمه إياه", s:3 }
    ]},

  { id:"q4", cat:"mindset",
    text:"بناء الوفرة يبدأ من الوعي الجماعي، الكلام عن الفلوس في بيتكم أو مع شريك حياتك:",
    fb:{high:"عندك مراجعة منتظمة للوضع المالي، وهذا أساس بناء الوفرة.",
        low:"الحديث عن الأمور المالية غالباً يكون وقت المشاكل فقط، حاول تفتح الحوار بشكل منتظم."},
    variants:{
      family:[
        { t:"موضوع حساس نتجنبه", s:0 },
        { t:"نتكلم فيه بس لما تطلع مشكلة", s:1 },
        { t:"نتكلم فيه عادي بس بدون خطة منظمة", s:2 },
        { t:"عندنا مراجعة منتظمة لوضعنا المالي", s:3 }
      ],
      personal:[
        { t:"ما أتكلم عن فلوسي مع أحد", s:0 },
        { t:"أتكلم بس لما يصير عندي مشكلة", s:1 },
        { t:"أتكلم مع المقربين بشكل عام", s:2 },
        { t:"أراجع وضعي المالي بشكل منتظم مع نفسي", s:3 }
      ]
    }},

  { id:"q5", cat:"discipline",
    text:"آخر مرة عرفت بالضبط وين راحت فلوسك الشهر اللي طاف:",
    fb:{high:"تقدر تحدد فئات مصاريفك، يعني عندك نظرة عامة على وين تروح فلوسك.",
        low:"ركز أكثر على تتبع تفاصيل المصاريف الصغيرة عشان تكون عندك صورة أوضح."},
    options:[
      { t:"ما أتذكر أو ما أتابع", s:0 },
      { t:"أعرف بشكل تقريبي عام", s:1 },
      { t:"أعرف الفئات الكبيرة (إيجار، أكل، فواتير)", s:2 },
      { t:"عندي تتبع تفصيلي لكل بند", s:3 }
    ]},

  { id:"q6", cat:"resilience",
    text:"لو طلعت لك مفاجأة مصروف ٣٠٠ دك هاليوم (تصليح، علاج، طاري)، شلون تتعامل معاها؟",
    fb:{high:"لديك مرونة بالتعامل مع المفاجآت المالية وعندك مخصص للطوارئ.",
        low:"المفاجآت تربكك مالياً، ابدأ ببناء مخصص بسيط للطوارئ يغطيها بدون قلق."},
    options:[
      { t:"أدبر بأي طريقة (تقسيط، أتسلف، تأجيل)", s:0 },
      { t:"استخدم بطاقة ائتمانية أو حساب جاري", s:1 },
      { t:"آخذ من حساب التوفير العام", s:2 },
      { t:"عندي مخصص للطوارئ يغطيها بدون قلق", s:3 }
    ]},

  { id:"q7", cat:"resilience",
    text:"الالتزامات المالية الشهرية عندك (أقساط، قروض، بطاقات ائتمان):",
    fb:{high:"التزاماتك الشهرية تحت السيطرة وهذا يعطيك مساحة مالية مريحة.",

/* ============================================================
   3) STATE + RENDER
   ============================================================ */
const state = { i:0, answers:{}, seg:"family", leadId:null };
const stage   = document.getElementById("stage");
const pbar    = document.getElementById("pbar");
const resultEl= document.getElementById("result");

function optionsFor(q){
  if(q.variants) return q.variants[state.seg] || q.variants.family;
  return q.options;
}

let advancing=false, advTimer=null;

function render(dir){
  const q = Q[state.i];
  const opts = optionsFor(q);
  const chosen = state.answers[q.id];
  pbar.style.width = (state.i/Q.length*100) + "%";
  advancing=false;
  const enter = dir==='back' ? 'back' : '';
  stage.innerHTML = `
    <div class="qcard ${enter}">
      <div class="eyebrow">سؤال ${toAr(state.i+1)} من ${toAr(Q.length)}</div>
      <h1 class="q">${q.text}</h1>
      <div class="options" role="radiogroup">
        ${opts.map((o,idx)=>`
          <button type="button" class="opt ${chosen===idx?'sel':''}" data-idx="${idx}" role="radio" aria-checked="${chosen===idx}">
            <span class="ring"><i></i></span><span class="t">${o.t}</span><span class="go" aria-hidden="true">‹</span>
          </button>`).join("")}
      </div>
      <div class="nav">
        ${state.i>0?'<button class="btn ghost" id="back">‹ السابق</button>':'<span></span>'}
        <button class="btn" id="next" ${chosen===undefined?'disabled':''}>${state.i===Q.length-1?'شوف نتيجتي':'متابعة'}</button>
      </div>
    </div>`;

  stage.querySelectorAll(".opt").forEach(b=>{
    b.addEventListener("click", ()=> select(+b.dataset.idx));
  });
  const nb = stage.querySelector("#next"); if(nb) nb.addEventListener("click", next);
  const bb = stage.querySelector("#back"); if(bb) bb.addEventListener("click", goBack);
}

function select(idx){
  const q = Q[state.i], opts = optionsFor(q);
  state.answers[q.id] = idx;
  if(q.seg) state.seg = opts[idx].seg;
  stage.querySelectorAll(".opt").forEach((x,j)=>{
    x.classList.toggle("sel", j===idx);
    x.setAttribute("aria-checked", j===idx);
  });
  const nb = stage.querySelector("#next"); if(nb) nb.disabled=false;
  clearTimeout(advTimer);
  advTimer = setTimeout(next, 480);   // auto-advance after the choice registers
}

function leave(then, back){
  const card = stage.firstElementChild;
  if(card) card.classList.add(back ? "out-back" : "out");
  clearTimeout(advTimer);
  advTimer = setTimeout(then, 200);
}
function next(){
  if(state.answers[Q[state.i].id]===undefined || advancing) return;
  advancing = true;
  if(state.i===Q.length-1) leave(()=> finish());
  else leave(()=>{ state.i++; render(); scrollTop(); });
}
function goBack(){
  if(state.i===0 || advancing) return;
  advancing = true;
  leave(()=>{ state.i--; render('back'); scrollTop(); }, true);
}

document.addEventListener("keydown", e=>{
  if(resultEl.classList.contains("show")) return;
  const opts = optionsFor(Q[state.i]);
  if(/^[1-9]$/.test(e.key)){ const i=+e.key-1; if(i<opts.length) select(i); }
  else if(e.key==="Enter") next();
  else if(e.key==="Backspace"){ e.preventDefault(); goBack(); }
});

function scrollTop(){ window.scrollTo({top:0,behavior:'smooth'}); }
function toAr(n){ return String(n).replace(/[0-9]/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]); }

/* ============================================================
   4) SCORING
   ============================================================ */
function score(){
  const cats = { mindset:{e:0,m:0}, discipline:{e:0,m:0}, resilience:{e:0,m:0}, growth:{e:0,m:0} };
  Q.forEach(q=>{
    if(q.scored===false) return;
    const opts = optionsFor(q);
    const idx  = state.answers[q.id];
    if(idx===undefined) return;
    const maxS = Math.max(...opts.map(o=>o.s));
    cats[q.cat].e += opts[idx].s;
    cats[q.cat].m += maxS;
  });
  const pct = o => o.m? Math.round(o.e/o.m*100) : 0;
  const out = {
    mindset:pct(cats.mindset), discipline:pct(cats.discipline),
    resilience:pct(cats.resilience), growth:pct(cats.growth)
  };
  const totE = Object.values(cats).reduce((a,c)=>a+c.e,0);
  const totM = Object.values(cats).reduce((a,c)=>a+c.m,0);
  out.overall = totM? Math.round(totE/totM*100) : 0;
  return out;
}
const band  = p => p>=75?"ممتاز": p>=50?"متوسط":"منخفض";
const bandC = p => p>=75?"var(--green)": p>=50?"var(--gold)":"var(--red)";

function buildLists(){
  const good=[], work=[];
  Q.forEach(q=>{
    if(!q.fb) return;
    const opts=optionsFor(q), idx=state.answers[q.id];
    if(idx===undefined) return;
    const s=opts[idx].s, maxS=Math.max(...opts.map(o=>o.s));
    if(s===maxS) good.push(q.fb.high);
    else if(s<=1) work.push(q.fb.low);
  });
  // psychographic nudge from Q10
  const q10 = state.answers.q10;
  if(q10!==undefined){
    const key = Q.find(q=>q.id==="q10").options[q10].key;
    if(key==="give") work.push("حافظ على رغبتك في العطاء، ولكن لا تهمل خططك الشخصية للمستقبل حتى تحقق التوازن بين العطاء والأمان المالي.");
  }
  if(good.length===0) good.push("عندك رغبة حقيقية بتحسين وضعك المالي — وهذي أهم نقطة انطلاق.");
  if(work.length===0) work.push("استمر على نظامك الحالي وركز على رفع مستوى الادخار والاستثمار للمرحلة الجاية.");
  return {good, work};
}

function diagText(p){
  if(p>=75) return "تشخيصك يبيّن إنك في مرحلة متقدمة من الوعي المالي، عندك نظام واضح وانضباط في التنفيذ. الفرصة الآن إنك تنتقل من التنظيم إلى التنمية: استثمار، أهداف أكبر، ونقل خبرتك لعائلتك ومن حولك.";
  if(p>=50) return "تشخيصك يبيّن أنك بنيت أساس قوي، عندك وعي مالي جيد وتتابع مصروفاتك وتتصرف بحكمة في أغلب المواقف. الفرصة الآن أنك تطور نظام موحد يربط بين أهدافك واحتياجاتك الفعلية، وتنقل نفسك من الاستقرار للوفرة. كل خطوة صغيرة تسويها الآن بتختصر عليك سنوات من التخبط لاحقاً.";
  return "تشخيصك يبيّن إنك في بداية الطريق، وفي جوانب أساسية تحتاج تتقوّى عشان تبني استقرار مالي. الخبر الزين إن نقطة البداية الصحيحة تقدر تغيّر مسارك بالكامل. ركز على خطوة وحدة في كل مرة، وابدأ ببناء وعي وتتبع بسيط لمصروفاتك.";
}

/* ============================================================
   5) FINISH → save lead → render result
   ============================================================ */
async function finish(){
  pbar.style.width = "100%";
  const sc = score();
  const lists = buildLists();
  // map answers to readable text for the lead record
  const readable = {};
  Q.forEach(q=>{ const idx=state.answers[q.id]; if(idx!==undefined) readable[q.id]=optionsFor(q)[idx].t; });

  // save anonymous lead (analytics) — best effort
  try{
    const ref = await addDoc(collection(db,"leads"), {
      source:"abundance-quiz",
      segment: state.seg,
      scores: sc,
      answers: readable,
      purchased:false,
      createdAt: serverTimestamp()
    });
    state.leadId = ref.id;
  }catch(e){ console.warn("lead save skipped", e); }

  renderResult(sc, lists);
}

function metricCard(key, pct){
  const m = CAT_META[key];
  return `<div class="metric" data-k="${key}" data-p="${pct}" style="--cc:${m.color}">
    <div class="mhead"><span class="chip">${m.icon}</span><h3>${m.title}</h3></div>
    <p>${m.desc}</p>
    <div class="bar"><i style="background:${bandC(pct)}"></i></div>
    <div class="val" style="color:${bandC(pct)}"><span class="cnum">٠%</span><span class="tag">${band(pct)}</span></div>
  </div>`;
}

function gauge(p){
  // semicircle, 3 colored segments + needle (drawn straight up, rotated by JS)
  const cx=130, cy=130, r=95;
  const arc=(a0,a1,color)=>{
    const p0=pt(cx,cy,r,a0), p1=pt(cx,cy,r,a1);
    const large = (a1-a0)>180?1:0;
    return `<path d="M ${p0.x} ${p0.y} A ${r} ${r} 0 ${large} 1 ${p1.x} ${p1.y}" fill="none" stroke="${color}" stroke-width="22" stroke-linecap="round"/>`;
  };
  return `<svg viewBox="0 0 260 160" width="100%" role="img" aria-label="درجتك ${toAr(p)}٪">
    ${arc(180,121,'var(--red)')}${arc(119,61,'var(--gold)')}${arc(59,0,'var(--green)')}
    <line id="ndl" x1="${cx}" y1="${cy}" x2="${cx-65}" y2="${cy}" stroke="var(--blue)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="9" fill="var(--blue)"/>
    <circle cx="${cx}" cy="${cy}" r="4" fill="#fff"/>
  </svg>`;
}
function pt(cx,cy,r,deg){ const a=deg*Math.PI/180; return {x:cx+r*Math.cos(a), y:cy-r*Math.sin(a)}; }

const BRAND_DOTS = ['#2F1748','#D5A347','#962D38','#2A898C'];
function dotField(variant){
  // scattered brand dots echoing the logo; positions in %
  const cfg = [
    [6,12,34],[20,72,18],[78,8,26],[90,60,40],[60,86,16],
    [40,6,14],[84,84,22],[12,52,20],[52,40,12],[70,30,18]
  ];
  const op = variant==='cta' ? .14 : .09;
  const spans = cfg.map((d,i)=>{
    const c = BRAND_DOTS[i%4];
    const dur = 6 + (i%5);     // 6-10s
    const del = (i*0.4).toFixed(1);
    return `<span style="top:${d[1]}%;left:${d[0]}%;width:${d[2]}px;height:${d[2]}px;background:${c};opacity:${op};animation:floaty ${dur}s ease-in-out ${del}s infinite"></span>`;
  }).join('');
  return `<div class="dots">${spans}</div>`;
}

function animateResult(sc){
  const reduce = window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
  // gauge needle sweep 0 -> overall
  const ndl = document.getElementById("ndl");
  const cx=130, cy=130, rr=65, dur=reduce?0:950, t0=performance.now();
  const ease = t => 1 - Math.pow(1-t,3);
  function frame(now){
    const t = dur? Math.min(1,(now-t0)/dur) : 1;
    const p = sc.overall * ease(t);
    const a = (180 - p/100*180) * Math.PI/180;
    if(ndl){ ndl.setAttribute("x2",(cx+rr*Math.cos(a)).toFixed(1)); ndl.setAttribute("y2",(cy-rr*Math.sin(a)).toFixed(1)); }
    if(t<1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
  countUp(document.getElementById("ovPct"), sc.overall, dur);
  if(!reduce) launchConfetti();
  // staggered category bars + counters
  document.querySelectorAll(".metric").forEach((m,i)=>{
    const pct = +m.dataset.p, bar = m.querySelector(".bar > i"), num = m.querySelector(".cnum");
    setTimeout(()=>{ if(bar) bar.style.width = pct + "%"; countUp(num, pct, reduce?0:900); }, reduce?0:120*i);
  });
}
function launchConfetti(){
  const colors=['#2F1748','#D5A347','#962D38','#2A898C','#2A898C'];
  for(let i=0;i<48;i++){
    const c=document.createElement('span'); c.className='confetti';
    const sz=6+Math.random()*8, dur=2+Math.random()*1.5;
    c.style.left=(Math.random()*100)+'vw';
    c.style.width=sz+'px'; c.style.height=sz+'px';
    c.style.background=colors[i%colors.length];
    if(Math.random()<0.5) c.style.borderRadius='50%';
    c.style.animationDuration=dur+'s';
    c.style.animationDelay=(Math.random()*0.3)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), (dur+0.5)*1000);
  }
}
function countUp(node, to, dur){
  if(!node) return;
  if(!dur){ node.textContent = toAr(to)+"%"; return; }
  const t0 = performance.now();
  function f(now){
    const t = Math.min(1,(now-t0)/dur);
    node.textContent = toAr(Math.round(to*(1-Math.pow(1-t,3)))) + "%";
    if(t<1) requestAnimationFrame(f);
  }
  requestAnimationFrame(f);
}

    const url = res.data && res.data.url;

    window.location.href = url;   // → Tap hosted payment page
  }catch(e){
    console.error(e);
    mErr.textContent="صار خطأ بإنشاء الدفعة، جرب مرة ثانية أو تواصل معنا واتساب.";
    mPay.disabled=false; mPay.textContent="الانتقال للدفع";
  }
});
function val(id){ return document.getElementById(id).value.trim(); }

/* GO */
render();
</script>
